<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login // Admin Control Panel</title>
    <style>
        :root {
            --bg-deep: #050508;
            --bg-surface: #0c0c14;
            --bg-card: rgba(15, 15, 27, 0.7);
            --accent-purple: #a855f7;
            --accent-purple-glow: rgba(168, 85, 247, 0.4);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border-purple: rgba(168, 85, 247, 0.2);
            --border-subtle: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Purple Cyber Glow Orbs */
        .glow-orb {
            position: fixed;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: var(--accent-purple);
            filter: blur(160px);
            opacity: 0.12;
            z-index: 1;
            pointer-events: none;
        }
        .orb-left { top: -100px; left: -100px; }
        .orb-right { bottom: -100px; right: -100px; }

        /* --- STAGE 1: PREMIUM LOGIN ARCHITECTURE --- */
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-purple);
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            padding: 45px 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(168, 85, 247, 0.05);
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .icon-lock {
            width: 54px;
            height: 54px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid var(--border-purple);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-purple);
            margin: 0 auto 20px;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.15);
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.88rem;
            text-align: center;
            margin-bottom: 35px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            color: #a855f7;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-subtle);
            padding: 15px 18px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.25s ease;
        }

        .input-field:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px var(--accent-purple-glow);
            background: rgba(0, 0, 0, 0.6);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 6px;
            display: none;
            font-weight: 500;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #a855f7, #7e22ce);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.25);
            transition: all 0.25s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(168, 85, 247, 0.4);
        }

        /* --- STAGE 2: PROFESSIONAL ADMIN PANEL --- */
        .admin-dashboard {
            display: none;
            opacity: 0;
            width: 100%;
            max-width: 1000px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 18px;
            padding: 35px;
            z-index: 10;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(0.98) translateY(15px);
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .metrics-grid {

            grid-template-columns: repeat(auto-fit, minmax(220px,
