<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal // Access Gate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mesh-grid"></div>
    <div class="glow-sphere sphere-alpha"></div>
    <div class="glow-sphere sphere-beta"></div>

    <div class="auth-wrapper">
        <div class="auth-header">
            <div class="security-shield">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <h2>System Gateway</h2>
            <p class="auth-subtitle">Provide clearance credentials to initialize interface</p>
        </div>

        <div class="form-container">
            <div class="input-track">
                <input type="text" id="userUID" placeholder=" " required value="frostpup">
                <label for="userUID">Identity / UID</label>
                <span class="track-indicator"></span>
            </div>

            <div class="input-track">
                <input type="password" id="passKey" placeholder=" " required oninput="evaluateKeySequence(this)">
                <label for="passKey">Security Key / PIN</label>
                <span class="track-indicator"></span>
                <div class="error-node" id="errorFeedback">Clearance code rejection triggered.</div>
            </div>

            <div class="form-utility">
                <label class="toggle-control">
                    <input type="checkbox" checked>
                    <span class="control-box"></span>
                    Keep session active
                </label>
                <a href="#" class="recovery-trigger">Forgot Security Key?</a>
            </div>

            <button class="submit-action" id="gateTrigger" onclick="processAccessRequest()">
                <span class="label-text" id="actionText">Authorize Terminal</span>
                <div class="loading-ring" id="actionSpinner"></div>
            </button>
        </div>

        <div class="federated-divider">
            <span>secure third-party authentication</span>
        </div>

        <div class="federated-grid">
            <button class="fed-provider">
                <span class="provider-badge google-spec"></span> Google
            </button>
            <button class="fed-provider">
                <span class="provider-badge apple-spec"></span> Apple
            </button>
        </div>
    </div>

    <script>
        function evaluateKeySequence(element) {
            if (element.value === '0296') {
                processAccessRequest();
            }
        }

        function processAccessRequest() {
            const pin = document.getElementById('passKey');
            const error = document.getElementById('errorFeedback');
            const text = document.getElementById('actionText');
            const spinner = document.getElementById('actionSpinner');
            const btn = document.getElementById('gateTrigger');

            // Hardcoded structural check for the private code
            if (pin.value === '0296' || pin.value.length >= 4) {
                if (pin.value === '0296') {
                    error.style.display = 'none';
                    text.style.opacity = '0';
                    spinner.style.display = 'block';
                    btn.classList.add('processing-state');

                    setTimeout(() => {
                        document.querySelector('.auth-wrapper').style.opacity = '0';
                        document.querySelector('.auth-wrapper').style.transform = 'scale(0.96) translateY(-10px)';
                        
                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 500);
                    }, 1200);
                } else {
                    // Trigger standard error routine for wrong attempts
                    error.style.display = 'block';
                    document.querySelector('.auth-wrapper').classList.add('hardware-shake');
                    pin.value = '';
                    pin.focus();
                    setTimeout(() => {
                        document.querySelector('.auth-wrapper').classList.remove('hardware-shake');
                    }, 400);
                }
            }
        }
    </script>
</body>
</html>
