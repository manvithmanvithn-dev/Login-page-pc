<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Mainframe // Administrative Gateway</title>
    <style>
        :root {
            --bg-deep: #030305;
            --bg-glass: rgba(13, 11, 22, 0.65);
            --border-neon: rgba(168, 85, 247, 0.25);
            --accent-glow: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            --text-bright: #f8fafc;
            --text-dim: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Fluid Neon Background Dynamics */
        .ambient-sphere {
            position: fixed;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            filter: blur(140px);
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
            animation: pulseGlow 8s infinite alternate ease-in-out;
        }
        .sphere-1 { width: 400px; height: 400px; top: -100px; left: -100px; }
        .sphere-2 { width: 450px; height: 450px; bottom: -100px; right: -100px; animation-delay: -4s; }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.12; }
            100% { transform: scale(1.15) translate(20px, 20px); opacity: 0.18; }
        }

        /* --- STAGE 1: LUXURY GLASS AUTH INTERFACE --- */
        .glass-auth-card {
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-neon);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            z-index: 10;
            text-align: center;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gateway-icon {
            width: 56px;
            height: 56px;
            background: rgba(168, 85, 247, 0.08);
            border: 1px solid var(--border-neon);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #a855f7;
            margin: 0 auto 24px;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        h2 {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gateway-subtitle {
            color: var(--text-dim);
            font-size: 0.88rem;
            margin-bottom: 36px;
            line-height: 1.4;
        }

        /* Form Engine Fields */
        .field-container {
            position: relative;
            margin-bottom: 24px;
            text-align: left;
        }

        .field-container label {
            display: block;
            color: #a855f7;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-left: 2px;
        }
