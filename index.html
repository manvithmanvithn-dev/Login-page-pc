<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Den — Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="panda-wrapper" id="pandaAvatar">
            <div class="panda-ears"></div>
            <div class="panda-face">
                <div class="panda-eye-patches">
                    <div class="patch left">
                        <div class="eye"></div>
                    </div>
                    <div class="patch right">
                        <div class="eye"></div>
                    </div>
                </div>
                <div class="panda-snout"></div>
            </div>
            <div class="panda-hands">
                <div class="paw left-paw">🐼</div>
                <div class="paw right-paw">🐼</div>
            </div>
        </div>

        <div class="login-card">
            <h2>Den</h2>
            <p class="subtitle">Welcome back. Your panda's keeping watch.</p>

            <div class="input-group">
                <label>Username</label>
                <input type="text" value="frostpup" id="usernameField">
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" value="••••••••" id="passwordField" onfocus="coverEyes()" onblur="uncoverEyes()" oninput="checkPrivateCode(this)">
                    <span class="eye-toggle">👁️</span>
                </div>
            </div>

            <div class="meta-row">
                <label class="checkbox-container">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button class="sign-in-btn" id="signInBtn" onclick="triggerDoorSequence()">
                <span class="btn-text" id="btnText">Sign in</span>
                <div class="door-animation-container" id="doorContainer">
                    <div class="stickman" id="stickman">🚶</div>
                    <div class="door-frame">
                        <div class="door-panel" id="doorPanel"></div>
                    </div>
                </div>
            </button>

            <div class="divider">or continue with</div>

            <div class="social-row">
                <button class="social-btn">Google</button>
                <button class="social-btn">Apple</button>
            </div>

            <p class="signup-text">New to Den? <a href="#">Create account</a></p>
        </div>
    </div>

    <script>
        const panda = document.getElementById('pandaAvatar');
        const passwordField = document.getElementById('passwordField');

        function coverEyes() {
            panda.classList.add('hide-eyes');
            if(passwordField.value === '••••••••') {
                passwordField.value = '';
            }
        }

        function uncoverEyes() {
            panda.classList.remove('hide-eyes');
            if(passwordField.value === '') {
                passwordField.value = '••••••••';
            }
        }

        function checkPrivateCode(input) {
            if (input.value === '0296') {
                triggerDoorSequence();
            }
        }

        function triggerDoorSequence() {
            const btn = document.getElementById('signInBtn');
            const btnText = document.getElementById('btnText');
            const doorContainer = document.getElementById('doorContainer');
            const doorPanel = document.getElementById('doorPanel');
            const stickman = document.getElementById('stickman');
            
            btnText.style.opacity = '0';
            btn.classList.add('morph-to-door');
            
            setTimeout(() => {
                doorContainer.style.display = 'flex';
                
                setTimeout(() => {
                    doorPanel.classList.add('open-door');
                    
                    setTimeout(() => {
                        stickman.classList.add('walk-in');
                        
                        setTimeout(() => {
                            btn.style.opacity = '0';
                            btn.style.transform = 'scale(0.9) translateY(-10px)';
                            window.location.href = "index.html"; 
                        }, 800);
                    }, 400);
                }, 300);
            }, 300);
        }
    </script>
</body>
</html>
